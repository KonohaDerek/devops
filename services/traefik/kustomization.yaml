apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization


resources:
  # Install Traefik Resource Definitions:
  - https://raw.githubusercontent.com/traefik/traefik/v3.5/docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml
  # Install RBAC for Traefik:
  - https://raw.githubusercontent.com/traefik/traefik/v3.5/docs/content/reference/dynamic-configuration/kubernetes-crd-rbac.yml
  - traefik-config.yaml
  - traefik-deployment.yaml
  - traefik-service.yaml

patches:
  - target:
      kind: ClusterRoleBinding
      name: traefik-ingress-controller
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: kube-system

images:
- name: traefik
  newName: traefik
  newTag: v3.5

namespace: kube-system