apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik-ingress-controller
  namespace: kube-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik-ingress-controller
  namespace: kube-system
  labels:
    app: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      serviceAccountName: traefik-ingress-controller
      containers:
        - name: traefik
          image: traefik:v2.10
          args:
            - --configFile=/etc/traefik/traefik.yml
            - --log.level=INFO
            - --accesslog
            - --api.dashboard=true
          ports:
            - name: web
              containerPort: 80
              hostPort: 80
            - name: websecure
              containerPort: 443
              hostPort: 443
            - name: admin
              containerPort: 8080
              hostPort: 8080
            - name: metrics
              containerPort: 9002
              hostPort: 9002
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: traefikdata
              mountPath: "/data"
            - name: origin-cert
              mountPath: /certs
              readOnly: true
            - name: traefik-config
              mountPath: /etc/traefik
          securityContext:
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
      volumes:
        - name: traefikdata
          hostPath:
            path: /home/devops/services/traefik/data
        - name: origin-cert
          secret:
            secretName: cloudflare-origin-cert
        - name: traefik-config
          configMap:
            name: traefik-config
